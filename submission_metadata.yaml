# ============================================================================
# Approach summary (<=200 words)
# ============================================================================

methodology_summary: |
  Offline multi-signal candidate ranker using hybrid retrieval plus structured
  hiring signals. Natural-language role queries are parsed for skills,
  experience, seniority, location, and aliases. Retrieval combines FAISS vector
  search over a local 384-dim hashing representation with BM25 keyword search,
  then merges candidates through Reciprocal Rank Fusion. In full query mode an
  optional cross-encoder reranker can refine relevance; batch submission mode
  skips neural reranking for deterministic CPU performance and uses normalized
  hybrid relevance instead. Final scoring is a weighted fusion of similarity,
  keyword match, structured skill overlap, experience fit, title fit,
  behavioral signals, career trajectory, and skill proficiency. Skill matching
  uses exact, alias, and fuzzy comparison against the structured skills array,
  not just free-text keyword stuffing. Behavioral scoring uses recruiter
  response rate, saves, completeness, verification, GitHub activity, openness to
  work, relocation, interview completion, and recency. Honeypot checks strongly
  penalize impossible company timelines, excessive skills per year, expert
  skills with zero usage, and unexplained long gaps. The writer enforces 100
  unique CAND_* rows with ranks 1-100 and non-increasing scores.

