# ============================================================================
# Approach summary (<=200 words)
# ============================================================================

methodology_summary: |
  Transparent, fully offline multi-signal ranker — no neural inference at rank
  time. Six weighted sub-scores sum to 1.0: semantic fit (TF-IDF cosine between
  a structured JD text and each candidate's headline/summary/career
  descriptions, deliberately excluding the skills array), title/career-
  trajectory fit (the decisive signal, weighted 2x skills; off-domain titles
  capped at 0.20), experience-band fit (5-9 yrs), skill credibility (weighted by
  endorsements, usage duration, and platform assessment scores; expert-with-0-
  months excluded), plus education and location. Disqualifier penalties handle
  services-only careers, vision/speech without NLP/IR, job-hopping, and stale
  activity. A bounded [0.5,1.0] behavioral multiplier down-weights disengaged or
  unreachable candidates without ever promoting an off-domain profile. A
  consistency detector forces internally impossible (honeypot) profiles to the
  bottom. This inverts the keyword-stuffer trap: the top 100 are AI/ML/search/
  NLP/recommendation engineers, not skill-list-padded off-domain candidates.
  Deterministic (byte-identical reruns); ~1-3 min for 100K candidates on CPU.

